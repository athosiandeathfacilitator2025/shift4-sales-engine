    /* ─────────────────────── SUPABASE CLIENT ──────────────── */

    const supabase = (window.SUPABASE_URL && window.SUPABASE_KEY)
      ? window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY)
      : null;

    async function fetchCallLog() {
      if (!supabase) {
        try { return JSON.parse(localStorage.getItem("shift4_call_log") || "[]"); } catch { return []; }
      }
      const { data, error } = await supabase
        .from("call_logs")
        .select("*")
        .order("time", { ascending: true });
      if (error) console.warn("Supabase fetch failed:", error.message);
      const rows = (data || []).map(r => ({
        id: r.id, time: r.time, outcome: r.outcome,
        stageReached: r.stage_reached, objectionId: r.objection_id,
        industryId: r.industry_id, callType: r.call_type, isFirstCall: r.is_first_call ?? true,
        openerScore: r.opener_score, confidenceScore: r.confidence_score, rapportScore: r.rapport_score,
        notes: r.notes, weight: r.weight,
      }));
      // Auto-migrate any localStorage calls not yet in Supabase
      try {
        const local = JSON.parse(localStorage.getItem("shift4_call_log") || "[]");
        const supaIds = new Set(rows.map(r => r.id));
        const unsync = local.filter(c => !supaIds.has(c.id));
        if (unsync.length) {
          await Promise.all(unsync.map(c => persistCall(c)));
          rows.push(...unsync);
          localStorage.removeItem("shift4_call_log");
        }
      } catch {}
      return rows;
    }

    async function persistCall(call) {
      // Always cache locally
      try {
        const existing = JSON.parse(localStorage.getItem("shift4_call_log") || "[]");
        if (!existing.find(c => c.id === call.id)) {
          localStorage.setItem("shift4_call_log", JSON.stringify([...existing, call]));
        }
      } catch {}
      if (!supabase) return;
      const { error } = await supabase.from("call_logs").upsert({
        id: call.id, time: call.time, outcome: call.outcome,
        stage_reached: call.stageReached, objection_id: call.objectionId,
        industry_id: call.industryId || null, call_type: call.callType || "outbound",
        is_first_call: call.isFirstCall ?? true,
        opener_score: call.openerScore, confidence_score: call.confidenceScore,
        rapport_score: call.rapportScore, notes: call.notes, weight: call.weight,
      });
      if (error) console.warn("Supabase save failed:", error.message);
    }

    /* ─────────────────────── STORAGE + COACHING UTILS ──────────────── */

    function useLocalStorage(key, defaultValue) {
      const [value, setValue] = useState(() => {
        try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : defaultValue; }
        catch { return defaultValue; }
      });
      const set = useCallback((v) => {
        const next = typeof v === "function" ? v(value) : v;
        setValue(next);
        try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      }, [value]);
      return [value, set];
    }

    const OUTCOME_WEIGHT = { won: 10, progressing: 7, qualified_lost: 4, lost: 2, noanswer: 1, voicemail: 1, wrongnumber: 0 };
    const BAD_OUTCOMES   = new Set(["lost", "noanswer", "voicemail", "wrongnumber"]);
    const GOOD_OUTCOMES  = new Set(["won", "progressing"]);

    function calcWeight(call) {
      const base = OUTCOME_WEIGHT[call.outcome] ?? 0;
      const skill = ((call.openerScore + call.confidenceScore + call.rapportScore) / 3) * 2;
      return Math.round((base * 0.6 + skill * 0.4) * 10) / 10;
    }

    function getTodayCalls(log) {
      const today = new Date().toDateString();
      return log.filter(c => new Date(c.time).toDateString() === today);
    }

    function getBadStreak(log) {
      const today = getTodayCalls(log);
      let streak = 0;
      for (let i = today.length - 1; i >= 0; i--) {
        if (BAD_OUTCOMES.has(today[i].outcome)) streak++;
        else break;
      }
      return streak;
    }

    function getHourlyBreakdown(log) {
      const today = getTodayCalls(log);
      const hours = {};
      today.forEach(c => {
        const h = new Date(c.time).getHours();
        if (!hours[h]) hours[h] = { calls: [], good: 0, bad: 0, score: 0 };
        hours[h].calls.push(c);
        if (GOOD_OUTCOMES.has(c.outcome)) hours[h].good++;
        else if (BAD_OUTCOMES.has(c.outcome)) hours[h].bad++;
        hours[h].score = Math.round(hours[h].calls.reduce((s, x) => s + x.weight, 0) / hours[h].calls.length * 10) / 10;
      });
      return hours;
    }

    function getGaps(log) {
      const today = getTodayCalls(log);
      if (today.length < 2) return null;
      // Most common objection
      const objCounts = {};
      today.forEach(c => { if (c.objectionId) objCounts[c.objectionId] = (objCounts[c.objectionId] || 0) + 1; });
      const topObj = Object.entries(objCounts).sort((a, b) => b[1] - a[1])[0];
      // Most common lost stage
      const stageCounts = {};
      today.filter(c => BAD_OUTCOMES.has(c.outcome)).forEach(c => { if (c.stageReached) stageCounts[c.stageReached] = (stageCounts[c.stageReached] || 0) + 1; });
      const weakStage = Object.entries(stageCounts).sort((a, b) => b[1] - a[1])[0];
      // Weakest skill
      const scores = { opener: 0, confidence: 0, rapport: 0 };
      today.forEach(c => { scores.opener += c.openerScore; scores.confidence += c.confidenceScore; scores.rapport += c.rapportScore; });
      const n = today.length;
      const avgScores = { opener: scores.opener/n, confidence: scores.confidence/n, rapport: scores.rapport/n };
      const weakSkill = Object.entries(avgScores).sort((a, b) => a[1] - b[1])[0];
      return { topObj, weakStage, weakSkill, avgScores };
    }

    function getDailyScore(log) {
      const today = getTodayCalls(log);
      if (!today.length) return 0;
      return Math.round(today.reduce((s, c) => s + c.weight, 0) / today.length * 10) / 10;
    }

    function getFirstCallRate(log) {
      const today = getTodayCalls(log);
      const firstCalls = today.filter(c => c.isFirstCall);
      if (!firstCalls.length) return null;
      const wins = firstCalls.filter(c => c.outcome === "won").length;
      return { rate: Math.round((wins / firstCalls.length) * 100), wins, total: firstCalls.length };
    }

    function getIndustryBreakdown(log) {
      const today = getTodayCalls(log);
      const bd = {};
      today.filter(c => c.industryId).forEach(c => {
        if (!bd[c.industryId]) bd[c.industryId] = { calls: 0, wins: 0, weight: 0 };
        bd[c.industryId].calls++;
        bd[c.industryId].weight += c.weight || 0;
        if (c.outcome === "won") bd[c.industryId].wins++;
      });
      return Object.entries(bd).map(([id, d]) => {
        const ind = INDUSTRIES.find(i => i.id === id);
        return { id, name: ind?.name?.split("(")[0].trim() || id, icon: ind?.icon || "🏭",
          ...d, winRate: Math.round((d.wins / d.calls) * 100),
          avgWeight: Math.round((d.weight / d.calls) * 10) / 10 };
      }).sort((a, b) => b.winRate - a.winRate);
    }

    function getWeekHistory(log) {
      const days = {};
      log.forEach(c => {
        const d = new Date(c.time).toDateString();
        if (!days[d]) days[d] = [];
        days[d].push(c);
      });
      const result = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date(); d.setDate(d.getDate() - i);
        const key = d.toDateString();
        const calls = days[key] || [];
        const score = calls.length ? Math.round(calls.reduce((s, c) => s + c.weight, 0) / calls.length * 10) / 10 : null;
        result.push({ label: i === 0 ? "Today" : d.toLocaleDateString("en-AU", { weekday: "short" }), score, calls: calls.length });
      }
      return result;
    }

    function checkHourTrigger(log) {
      const hourly = getHourlyBreakdown(log);
      const now = new Date().getHours();
      const h = hourly[now];
      if (!h || h.calls.length < 4) return false;
      return (h.good / h.calls.length) < 0.25;
    }

    function CoachingView({ log, onSetTab, isLoading }) {
      const today = getTodayCalls(log);
      const dailyScore = getDailyScore(log);
      const streak = getBadStreak(log);

      const fcr = getFirstCallRate(log);
      const industryBreakdown = getIndustryBreakdown(log);
      const [dailyTarget, setDailyTarget] = useLocalStorage("shift4_daily_target", 50);
      const [editingTarget, setEditingTarget] = useState(false);
      const [targetInput, setTargetInput] = useState(String(dailyTarget));

      const won = today.filter(c => c.outcome === "won").length;
      const progressed = today.filter(c => c.outcome === "progressing").length;
      const goodCalls = won + progressed;
      const winRate = today.length ? Math.round((goodCalls / today.length) * 100) : 0;

      // Projected EOD calls based on current hour pace (9am–5pm = 8 hour day)
      const nowHour = new Date().getHours();
      const workStart = 9;
      const workEnd = 17;
      const hoursElapsed = Math.max(1, nowHour - workStart);
      const hoursRemaining = Math.max(0, workEnd - nowHour);
      const projectedCalls = today.length ? Math.round((today.length / hoursElapsed) * (hoursElapsed + hoursRemaining)) : 0;
      const fcrPct = fcr?.rate ?? null;
      const fcrColor = fcrPct === null ? "#64748b" : fcrPct >= 60 ? "#4ade80" : fcrPct >= 40 ? "#fbbf24" : "#f87171";

      const scoreColour = dailyScore >= 7 ? "#4ade80" : dailyScore >= 4 ? "#fbbf24" : "#f87171";
      const activeHours = Object.keys(hourly).map(Number).sort((a, b) => a - b);

      // Run Rate card (shown always, even when no calls yet)
      const RunRateCard = (
        <div style={{ background: "#0c1a2e", border: "1px solid #1e3a5f", borderRadius: 14, padding: 20, marginBottom: 20 }}>

                <div style={{ position: "absolute", left: "60%", top: 0, transform: "translateX(-50%)", color: "#60a5fa", fontSize: 9, fontWeight: 800, whiteSpace: "nowrap" }}>60% target ▼</div>
                <div style={{ background: "#0f1117", borderRadius: 99, height: 8, overflow: "hidden", position: "relative" }}>
                  <div style={{ width: `${Math.min(100, fcrPct)}%`, height: "100%", background: fcrColor, borderRadius: 99, transition: "width .5s" }} />
                </div>
                <div style={{ position: "absolute", left: "60%", top: 14, bottom: 0, width: 3, background: "#3b82f6", transform: "translateX(-50%)", zIndex: 2, pointerEvents: "none" }} />
              </div>
            </div>
          )}

          {!fcr && today.length > 0 && (
            <p style={{ color: "#475569", fontSize: 12, marginTop: 8 }}>When logging calls, tick "First ever contact?" to start tracking your first-call close rate.</p>
          )}
          {today.length === 0 && (
            <p style={{ color: "#475569", fontSize: 12, marginTop: 8 }}>Log your first call to start tracking. Target: {dailyTarget} calls, 60% first-call close rate.</p>
          )}
        </div>
      );

      if (isLoading) {
        return (
          <div style={{ textAlign: "center", padding: "60px 24px" }}>
            <div style={{ fontSize: 36, marginBottom: 12, animation: "spin 1s linear infinite" }}>⏳</div>
            <p style={{ color: "#64748b", fontSize: 14 }}>Loading your call history…</p>
          </div>
        );
      }

      if (today.length === 0) {
        return (
          <div>
            {RunRateCard}
            <div style={{ textAlign: "center", padding: "40px 24px" }}>
              <div style={{ fontSize: 52, marginBottom: 16 }}>📞</div>
              <h3 style={{ color: "#f1f5f9", fontSize: 18, fontWeight: 700, marginBottom: 8 }}>No calls logged yet today</h3>
              <p style={{ color: "#64748b", fontSize: 14 }}>Tap <strong style={{ color: "#f1f5f9" }}>🎯 Pre-Call</strong> to prep before each dial, then <strong style={{ color: "#f1f5f9" }}>📞 Log Call</strong> after each call ends. Your dashboard builds automatically.</p>
            </div>
          </div>
        );
      }

      return (
        <div>
          {RunRateCard}
          {/* Today's momentum */}
          <div style={{ background: "linear-gradient(135deg, #0f1d3d 0%, #1a1d27 100%)", border: "1px solid #1e3a5f", borderRadius: 14, padding: 20, marginBottom: 20 }}>
            <p style={{ color: "#64748b", fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 12 }}>Today's Momentum</p>
            <div style={{ display: "flex", gap: 16, flexWrap: "wrap", alignItems: "center" }}>
              <div>
                <p style={{ color: scoreColour, fontSize: 40, fontWeight: 800, lineHeight: 1 }}>{dailyScore}</p>
                <p style={{ color: "#64748b", fontSize: 12 }}>avg score / 10</p>
              </div>
              <div style={{ flex: 1, display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(90px, 1fr))", gap: 10 }}>
                {[
                  { label: "Calls made", value: today.length, color: "#e2e8f0" },
                  { label: "Won", value: won, color: "#4ade80" },
                  { label: "Progressed", value: progressed, color: "#60a5fa" },
                  { label: "Win rate", value: `${winRate}%`, color: winRate >= 50 ? "#4ade80" : winRate >= 25 ? "#fbbf24" : "#f87171" },
                ].map((s, i) => (
                  <div key={i} style={{ background: "#0f1117", borderRadius: 10, padding: "10px 12px" }}>
                    <p style={{ color: s.color, fontSize: 20, fontWeight: 800 }}>{s.value}</p>
                    <p style={{ color: "#64748b", fontSize: 11 }}>{s.label}</p>
                  </div>
                ))}
              </div>
            </div>
            {/* Score bar */}
            <div style={{ marginTop: 14, background: "#0f1117", borderRadius: 99, height: 8, overflow: "hidden" }}>
              <div style={{ width: `${(dailyScore / 10) * 100}%`, height: "100%", background: scoreColour, borderRadius: 99, transition: "width .5s" }} />
            </div>
            {streak > 0 && (
              <p style={{ color: streak >= 3 ? "#f87171" : "#fbbf24", fontSize: 13, marginTop: 10, fontWeight: 600 }}>
                {streak >= 3 ? `🚨 ${streak} tough calls in a row — check the intervention prompt` : `⚠️ ${streak} tough calls in a row — check the Objections tab before the next one`}
              </p>
            )}
          </div>

          {/* Hour by hour */}
          {activeHours.length > 0 && (
            <div style={{ marginBottom: 20 }}>
              <p style={{ color: "#64748b", fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 12 }}>Hour by Hour</p>
              {activeHours.map(h => {
                const block = hourly[h];
                const label = `${h % 12 || 12}${h < 12 ? "am" : "pm"}`;
                const rate = block.calls.length ? block.good / block.calls.length : 0;
                const barColour = rate >= 0.5 ? "#4ade80" : rate >= 0.25 ? "#fbbf24" : "#f87171";
                return (
                  <div key={h} style={{ display: "flex", gap: 12, alignItems: "center", marginBottom: 8 }}>
                    <span style={{ color: "#64748b", fontSize: 12, width: 36, textAlign: "right", flexShrink: 0 }}>{label}</span>
                    <div style={{ flex: 1, background: "#1a1d27", borderRadius: 8, height: 28, overflow: "hidden", position: "relative" }}>
                      <div style={{ width: `${(block.score / 10) * 100}%`, height: "100%", background: barColour, opacity: .3 }} />
                      <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", paddingLeft: 10, gap: 6 }}>
                        {block.calls.map((c, i) => (
                          <span key={i} style={{ width: 10, height: 10, borderRadius: "50%", background: OUTCOME_COLOURS[c.outcome], display: "inline-block", flexShrink: 0 }} title={OUTCOME_LABELS[c.outcome]} />
                        ))}
                      </div>
                    </div>
                    <span style={{ color: barColour, fontSize: 12, width: 28, textAlign: "right", fontWeight: 600 }}>{block.score}</span>
                    <span style={{ color: "#64748b", fontSize: 11, width: 40 }}>{block.calls.length} calls</span>
                  </div>
                );
              })}
              <div style={{ display: "flex", gap: 12, marginTop: 8 }}>
                {Object.entries(OUTCOME_COLOURS).map(([k, v]) => (
                  <div key={k} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                    <div style={{ width: 8, height: 8, borderRadius: "50%", background: v }} />
                    <span style={{ color: "#64748b", fontSize: 10 }}>{OUTCOME_LABELS[k]}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Gap analysis */}
          {gaps && (
            <div style={{ marginBottom: 20 }}>
              <p style={{ color: "#64748b", fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 12 }}>Where the Gaps Are</p>
              <div style={{ display: "grid", gap: 10 }}>
                {gaps.weakStage && STAGE_GUIDANCE[gaps.weakStage[0]] && (
                  <div style={{ background: "#1f0a0a", border: "1px solid #7f1d1d", borderRadius: 12, padding: 14 }}>
                    <p style={{ color: "#f87171", fontSize: 12, fontWeight: 700, marginBottom: 4 }}>🛑 Calls are dying at: {STAGE_GUIDANCE[gaps.weakStage[0]].label}</p>
                    <p style={{ color: "#fca5a5", fontSize: 13, marginBottom: 10 }}>{STAGE_GUIDANCE[gaps.weakStage[0]].tip}</p>
                    <button onClick={() => onSetTab(STAGE_GUIDANCE[gaps.weakStage[0]].tab)} style={{
                      background: "#7f1d1d", border: "none", borderRadius: 8, padding: "6px 14px", color: "#f87171", fontSize: 12, fontWeight: 600, cursor: "pointer",
                    }}>Go to {STAGE_GUIDANCE[gaps.weakStage[0]].tab === "objections" ? "Objections" : STAGE_GUIDANCE[gaps.weakStage[0]].tab === "bna" ? "BNA" : "Lost Leads"} →</button>
                  </div>
                )}
                {gaps.topObj && OBJECTIONS.find(o => o.id === gaps.topObj[0]) && (
                  <div style={{ background: "#2d1b00", border: "1px solid #713f12", borderRadius: 12, padding: 14 }}>
                    <p style={{ color: "#fbbf24", fontSize: 12, fontWeight: 700, marginBottom: 4 }}>⚠️ Top objection today: "{OBJECTIONS.find(o => o.id === gaps.topObj[0])?.objection}"</p>
                    <p style={{ color: "#fde68a", fontSize: 13, marginBottom: 10 }}>Hit {gaps.topObj[1]} time{gaps.topObj[1] > 1 ? "s" : ""}. Practise the rebuttal until it's second nature.</p>
                    <button onClick={() => onSetTab("objections")} style={{
                      background: "#713f12", border: "none", borderRadius: 8, padding: "6px 14px", color: "#fbbf24", fontSize: 12, fontWeight: 600, cursor: "pointer",
                    }}>Review Rebuttal →</button>
                  </div>
                )}
                {gaps.weakSkill && SKILL_DRILLS[gaps.weakSkill[0]] && (
                  <div style={{ background: "#0c1a2e", border: "1px solid #1e3a5f", borderRadius: 12, padding: 14 }}>
                    <p style={{ color: "#60a5fa", fontSize: 12, fontWeight: 700, marginBottom: 4 }}>📈 Lowest skill score: {SKILL_DRILLS[gaps.weakSkill[0]].label} (avg {gaps.avgScores[gaps.weakSkill[0]].toFixed(1)}/5)</p>
                    <p style={{ color: "#93c5fd", fontSize: 13, marginBottom: 10 }}>{SKILL_DRILLS[gaps.weakSkill[0]].drill}</p>
                    <button onClick={() => onSetTab(SKILL_DRILLS[gaps.weakSkill[0]].tab)} style={{
                      background: "#1e3a5f", border: "none", borderRadius: 8, padding: "6px 14px", color: "#60a5fa", fontSize: 12, fontWeight: 600, cursor: "pointer",
                    }}>Go there →</button>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* Weekly bar chart */}
          <div style={{ marginBottom: 20 }}>
            <p style={{ color: "#64748b", fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 12 }}>7-Day Momentum</p>
            <div style={{ display: "flex", gap: 6, alignItems: "flex-end", height: 80 }}>
              {week.map((d, i) => {
                const pct = d.score !== null ? (d.score / 10) * 100 : 0;
                const col = d.score >= 7 ? "#4ade80" : d.score >= 4 ? "#fbbf24" : d.score !== null ? "#f87171" : "#2d3748";
                return (
                  <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
                    <div style={{ width: "100%", background: "#1a1d27", borderRadius: 4, height: 64, display: "flex", alignItems: "flex-end", overflow: "hidden" }}>
                      <div style={{ width: "100%", height: `${pct}%`, background: col, borderRadius: "4px 4px 0 0", transition: "height .4s", opacity: d.label === "Today" ? 1 : 0.6 }} />
                    </div>
                    <span style={{ color: d.label === "Today" ? "#f1f5f9" : "#64748b", fontSize: 10, fontWeight: d.label === "Today" ? 700 : 400 }}>{d.label}</span>
                    {d.score !== null && <span style={{ color: col, fontSize: 10 }}>{d.score}</span>}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Call log */}
          <div style={{ marginBottom: 20 }}>
            <p style={{ color: "#64748b", fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 12 }}>Today's Calls ({today.length})</p>
            {[...today].reverse().map((c, i) => {
              const t = new Date(c.time);
              const timeStr = t.toLocaleTimeString("en-AU", { hour: "2-digit", minute: "2-digit" });
              const obj = OBJECTIONS.find(o => o.id === c.objectionId);
              const ind = INDUSTRIES.find(x => x.id === c.industryId);
              return (
                <div key={i} style={{ display: "flex", gap: 12, alignItems: "center", padding: "10px 14px", background: "#1a1d27", border: "1px solid #2d3748", borderRadius: 10, marginBottom: 6 }}>
                  <div style={{ width: 10, height: 10, borderRadius: "50%", background: OUTCOME_COLOURS[c.outcome], flexShrink: 0 }} />
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                      <span style={{ color: OUTCOME_COLOURS[c.outcome], fontSize: 13, fontWeight: 700 }}>{OUTCOME_LABELS[c.outcome]}</span>
                      <span style={{ color: "#64748b", fontSize: 12 }}>at {timeStr}</span>
                      {c.isFirstCall && <span style={{ background: "#052e16", color: "#4ade80", fontSize: 10, fontWeight: 700, borderRadius: 99, padding: "1px 7px" }}>1st call</span>}
                      {c.callType === "inbound" && <span style={{ background: "#150d2e", color: "#c084fc", fontSize: 10, fontWeight: 700, borderRadius: 99, padding: "1px 7px" }}>inbound</span>}
                      {ind && <span style={{ color: "#64748b", fontSize: 11 }}>{ind.icon}</span>}
                      {obj && <span style={{ color: "#fbbf24", fontSize: 11 }}>objection: {obj.objection.substring(0, 30)}…</span>}
                    </div>
                    {c.notes && <p style={{ color: "#64748b", fontSize: 12, marginTop: 2 }}>{c.notes}</p>}
                  </div>
                  <span style={{ color: "#94a3b8", fontSize: 13, fontWeight: 600, flexShrink: 0 }}>{c.weight}/10</span>
                </div>
              );
            })}
          </div>

          {/* Industry breakdown */}
          {industryBreakdown.length > 0 && (
            <div>
              <p style={{ color: "#64748b", fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 12 }}>Industry Performance Today</p>
              {industryBreakdown.map((ind, i) => (
                <div key={i} style={{ display: "flex", gap: 12, alignItems: "center", padding: "10px 14px", background: "#1a1d27", border: "1px solid #2d3748", borderRadius: 10, marginBottom: 6 }}>
                  <span style={{ fontSize: 20, flexShrink: 0 }}>{ind.icon}</span>
                  <div style={{ flex: 1 }}>
                    <p style={{ color: "#e2e8f0", fontSize: 13, fontWeight: 600 }}>{ind.name}</p>
                    <p style={{ color: "#64748b", fontSize: 11 }}>{ind.calls} call{ind.calls > 1 ? "s" : ""} · {ind.wins} won · avg score {ind.avgWeight}</p>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <p style={{ color: ind.winRate >= 60 ? "#4ade80" : ind.winRate >= 30 ? "#fbbf24" : "#f87171", fontSize: 18, fontWeight: 800 }}>{ind.winRate}%</p>
                    <p style={{ color: "#64748b", fontSize: 10 }}>win rate</p>
                  </div>
                </div>
              ))}
              <button onClick={() => onSetTab("industries")} style={{
                marginTop: 8, background: "none", border: "1px solid #2d3748", borderRadius: 8, padding: "6px 14px",
                color: "#64748b", fontSize: 12, cursor: "pointer",
              }}>View all Industry Cards →</button>
            </div>
          )}
        </div>
      );
    }

    function FloatingLogButton({ onClick }) {
      return (
        <button onClick={onClick} style={{
          position: "fixed", bottom: 24, right: 24, zIndex: 900,
          background: "#2563eb", color: "#fff", border: "none", borderRadius: 99,
          padding: "12px 20px", fontSize: 14, fontWeight: 700, cursor: "pointer",
          boxShadow: "0 4px 20px rgba(37,99,235,.5)", display: "flex", alignItems: "center", gap: 8,
        }}>
          <span style={{ fontSize: 18 }}>📞</span> Log Call
        </button>
      );
    }

    /* ─────────────────────────── PRE-CALL PLANNER ─────────────────────────── */

    const PRE_CALL_CHECKLIST = [
      "Know the business name + decision-maker's name",
      "Know their current payment provider (ask if you don't)",
      "Clear close objective: first-call close OR book follow-up",
      "Opener scripted and ready to go",
      "Top 1–2 likely objections anticipated with rebuttals ready",
    ];

    function PreCallModal({ onStart, onClose }) {
      const [industryId, setIndustryId]     = useState("");
      const [callType,   setCallType]       = useState("outbound");
      const [checklist,  setChecklist]      = useState(Array(PRE_CALL_CHECKLIST.length).fill(false));
      const [opener,     setOpener]         = useState("");

      const selectedIndustry = INDUSTRIES.find(i => i.id === industryId);
      const allChecked = checklist.every(Boolean);

      function toggleCheck(i) {
        setChecklist(prev => prev.map((v, idx) => idx === i ? !v : v));
      }

      return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.8)", zIndex: 1100, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
          <div style={{ background: "#1a1d27", border: "1px solid #2d3748", borderRadius: 18, padding: 24, width: "100%", maxWidth: 480, maxHeight: "90vh", overflowY: "auto" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
              <h2 style={{ color: "#f1f5f9", fontSize: 18, fontWeight: 800 }}>🎯 Pre-Call Setup</h2>
              <button onClick={onClose} style={{ background: "none", border: "none", color: "#64748b", fontSize: 20, cursor: "pointer" }}>✕</button>
            </div>

            {/* Call type */}
            <p style={{ color: "#94a3b8", fontSize: 12, fontWeight: 600, textTransform: "uppercase", letterSpacing: ".4px", marginBottom: 8 }}>Call type</p>
            <div style={{ display: "flex", gap: 8, marginBottom: 18 }}>
              {["inbound", "outbound"].map(t => (
                <button key={t} onClick={() => setCallType(t)} style={{
                  flex: 1, padding: "10px", borderRadius: 10, cursor: "pointer", fontSize: 13, fontWeight: 700,
                  border: `1px solid ${callType === t ? (t === "inbound" ? "#4ade80" : "#60a5fa") : "#2d3748"}`,
                  background: callType === t ? (t === "inbound" ? "#052e16" : "#0c1a2e") : "transparent",
                  color: callType === t ? (t === "inbound" ? "#4ade80" : "#60a5fa") : "#64748b",
                }}>
                  {t === "inbound" ? "📥 Inbound" : "📤 Outbound"}
                </button>
              ))}
            </div>

            {/* Industry */}
            <p style={{ color: "#94a3b8", fontSize: 12, fontWeight: 600, textTransform: "uppercase", letterSpacing: ".4px", marginBottom: 8 }}>Industry (optional)</p>
            <select value={industryId} onChange={e => setIndustryId(e.target.value)} style={{
              width: "100%", padding: "10px 12px", background: "#0f1117", border: "1px solid #2d3748",
              borderRadius: 8, color: "#e2e8f0", fontSize: 13, marginBottom: 18, outline: "none",
            }}>
              <option value="">— Select industry —</option>
              {INDUSTRIES.map(i => <option key={i.id} value={i.id}>{i.icon} {i.name.split("(")[0].trim()}</option>)}
            </select>

            {/* Industry tip */}
            {selectedIndustry && (
              <div style={{ background: "#0c1a2e", border: "1px solid #1e3a5f", borderRadius: 10, padding: 12, marginBottom: 18 }}>
                <p style={{ color: "#60a5fa", fontSize: 12, fontWeight: 700, marginBottom: 4 }}>💡 Opening hook for {selectedIndustry.name.split("(")[0].trim()}</p>
                <p style={{ color: "#93c5fd", fontSize: 12, fontStyle: "italic" }}>{selectedIndustry.hook}</p>
                <p style={{ color: "#64748b", fontSize: 11, marginTop: 6 }}>Common rejection: {selectedIndustry.rejection[0]}</p>
              </div>
            )}

            {/* Checklist */}
            <p style={{ color: "#94a3b8", fontSize: 12, fontWeight: 600, textTransform: "uppercase", letterSpacing: ".4px", marginBottom: 10 }}>Pre-call checklist</p>
            <div style={{ marginBottom: 18 }}>
              {PRE_CALL_CHECKLIST.map((item, i) => (
                <div key={i} onClick={() => toggleCheck(i)} style={{
                  display: "flex", gap: 10, alignItems: "center", padding: "9px 12px",
                  background: checklist[i] ? "#052e16" : "#0f1117", borderRadius: 8, marginBottom: 6,
                  border: `1px solid ${checklist[i] ? "#14532d" : "#2d3748"}`, cursor: "pointer",
                }}>
                  <span style={{ fontSize: 16, flexShrink: 0 }}>{checklist[i] ? "✅" : "⬜"}</span>
                  <span style={{ color: checklist[i] ? "#4ade80" : "#94a3b8", fontSize: 13 }}>{item}</span>
                </div>
              ))}
            </div>

            {/* Opener */}
            <p style={{ color: "#94a3b8", fontSize: 12, fontWeight: 600, textTransform: "uppercase", letterSpacing: ".4px", marginBottom: 8 }}>Your planned opener (optional)</p>
            <textarea value={opener} onChange={e => setOpener(e.target.value)}
              placeholder="Write your first 2 sentences before you dial..."
              style={{ width: "100%", padding: "10px 12px", background: "#0f1117", border: "1px solid #2d3748", borderRadius: 8, color: "#e2e8f0", fontSize: 13, resize: "vertical", minHeight: 72, outline: "none", marginBottom: 20 }}
            />

            {!allChecked && (
              <p style={{ color: "#fbbf24", fontSize: 12, marginBottom: 12, fontWeight: 600 }}>⚠️ {checklist.filter(Boolean).length}/{PRE_CALL_CHECKLIST.length} items checked — tick all 5 for a first-call close edge</p>
            )}

            <p style={{ color: "#64748b", fontSize: 11, marginBottom: 10, textAlign: "center" }}>
              After the call ends, tap <strong style={{ color: "#94a3b8" }}>📞 Log Call</strong> — your industry + call type will be pre-filled.
            </p>
            <button onClick={() => onStart({ industryId: industryId || null, callType, checklist, opener })} style={{
              width: "100%", padding: "14px", background: allChecked ? "#16a34a" : "#2563eb", border: "none", borderRadius: 10,
              color: "#fff", fontSize: 15, fontWeight: 700, cursor: "pointer",
            }}>
              {allChecked ? "✅ Prep Done — Dial Now" : "Skip to Dialling →"}
            </button>
          </div>
        </div>
      );
    }

    /* ─────────────────────────── LIVE LISTEN ─────────────────────────── */

    const DANGER_KEYWORDS = [
      { phrases: ["surcharge", "surcharging", "rba", "zero cost", "zero fee", "no fee"], objectionId: "surcharge-ban" },
      { phrases: ["contract", "locked in", "lock in", "exit fee", "12 month", "24 month"], objectionId: "locked-in" },
      { phrases: ["with my bank", "our bank", "commonwealth", "nab", "anz", "westpac", "use the bank"], objectionId: "happy-with-bank" },
      { phrases: ["too expensive", "cost too much", "too much", "cheaper option", "other quote", "better rate"], objectionId: "costs-too-much" },
      { phrases: ["think about it", "need to think", "let me think", "call you back", "get back to you"], objectionId: "need-to-think" },
      { phrases: ["partner", "spouse", "husband", "wife", "other director", "run it by"], objectionId: "speak-to-partner" },
      { phrases: ["call you back", "busy right now", "not now", "bad time", "call me later"], objectionId: "will-call-back" },
      { phrases: ["complicated", "too hard", "difficult to switch", "not sure how", "too much hassle"], objectionId: "too-complicated" },
      { phrases: ["not ready", "not the right time", "bad timing", "slow period", "just expanded"], objectionId: "bad-timing" },
    ];

    const BUYING_SIGNALS = [
      "how much", "what's the cost", "what does it cost", "what do you charge",
      "how long does it take", "how quickly", "when can you", "sounds good",
      "that's interesting", "tell me more", "how does that work", "what's included",
      "can you send", "send me", "do you do", "is that available",
      "yes", "sure", "happy to", "let's do it", "let's go ahead",
    ];

    function LiveListenPanel({ onGradeCall, onClose }) {
      const streamRef      = useRef(null);
      const recognitionRef = useRef(null);
      const audioCtxRef    = useRef(null);
      const analyserRef    = useRef(null);
      const animFrameRef   = useRef(null);
      const timerRef       = useRef(null);
      const startTimeRef   = useRef(null);

      const [isListening, setIsListening] = useState(false);
      const [transcript,  setTranscript]  = useState("");
      const [alerts,      setAlerts]      = useState([]);
      const [signals,     setSignals]     = useState([]);
      const [callTimer,   setCallTimer]   = useState(0);
      const [audioLevel,  setAudioLevel]  = useState(0);
      const [permError,     setPermError]     = useState(null);
      const [showPingPong,  setShowPingPong]  = useState(false);
      const [pingPongIdx,   setPingPongIdx]   = useState(0);

      useEffect(() => { return () => stopAll(); }, []);

      // Auto-jump ping-pong when a new objection is detected
      useEffect(() => {
        if (!alerts.length || !showPingPong) return;
        const lastId = alerts[alerts.length - 1].objectionId;
        const idx = OBJECTIONS.findIndex(o => o.id === lastId);
        if (idx >= 0) setPingPongIdx(idx);
      }, [alerts]);

      function stopAll() {
        if (recognitionRef.current) { try { recognitionRef.current.stop(); } catch {} recognitionRef.current = null; }
        if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; }
        if (audioCtxRef.current) { try { audioCtxRef.current.close(); } catch {} audioCtxRef.current = null; }
        if (animFrameRef.current) { cancelAnimationFrame(animFrameRef.current); animFrameRef.current = null; }
        if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
      }

      function analyzeText(text) {
        const lower = text.toLowerCase();
        for (const { phrases, objectionId } of DANGER_KEYWORDS) {
          for (const phrase of phrases) {
            if (lower.includes(phrase)) {
              setAlerts(prev => {
                const recent = prev.find(a => a.objectionId === objectionId && (Date.now() - a.ts < 30000));
                if (recent) return prev;
                return [...prev.slice(-9), { objectionId, phrase, ts: Date.now() }];
              });
            }
          }
        }
        for (const phrase of BUYING_SIGNALS) {
          if (lower.includes(phrase)) {
            setSignals(prev => prev.includes(phrase) ? prev : [...prev.slice(-9), phrase]);
          }
        }
      }

      async function startListening() {
        stopAll(); // clean up any previous session first
        setPermError(null);
        setIsListening(false);
        try {
          const stream = await navigator.mediaDevices.getDisplayMedia({ video: false, audio: true });
          streamRef.current = stream;

          const ctx      = new AudioContext();
          const analyser = ctx.createAnalyser();
          analyser.fftSize = 256;
          const src = ctx.createMediaStreamSource(stream);
          src.connect(analyser); // silent — NOT connected to ctx.destination
          audioCtxRef.current  = ctx;
          analyserRef.current  = analyser;

          const data = new Uint8Array(analyser.frequencyBinCount);
          function tick() {
            analyser.getByteTimeDomainData(data);
            let sum = 0;
            for (const v of data) sum += Math.abs(v - 128);
            setAudioLevel(Math.min(100, Math.round((sum / data.length) * 5)));
            animFrameRef.current = requestAnimationFrame(tick);
          }
          tick();

          if ("webkitSpeechRecognition" in window) {
            const recog = new webkitSpeechRecognition();
            recog.continuous     = true;
            recog.interimResults = true;
            recog.lang           = "en-AU";
            recog.onresult = (e) => {
              let final_ = "";
              for (let i = e.resultIndex; i < e.results.length; i++) {
                if (e.results[i].isFinal) final_ += e.results[i][0].transcript + " ";
              }
              if (final_) {
                setTranscript(prev => prev + final_);
                analyzeText(final_);
              }
            };
            recog.onend = () => { if (streamRef.current) { try { recog.start(); } catch {} } };
            recog.onerror = (e) => { if (e.error !== "no-speech") console.warn("Recog:", e.error); };
            recog.start();
            recognitionRef.current = recog;
          }

          startTimeRef.current = Date.now();
          timerRef.current = setInterval(() => {
            setCallTimer(Math.floor((Date.now() - startTimeRef.current) / 1000));
          }, 1000);

          setIsListening(true);
        } catch (err) {
          if (err.name === "NotAllowedError" || err.name === "AbortError") {
            setPermError("Share was cancelled. Click Start and choose the tab with your softphone.");
          } else {
            setPermError("Could not capture: " + err.message);
          }
        }
      }

      function stopListening() { stopAll(); setIsListening(false); }

      function handleGradeCall() {
        const lastAlert = alerts[alerts.length - 1];
        stopListening();
        onGradeCall({
          notes: transcript.slice(-400) || "",
          objectionId: lastAlert?.objectionId || "",
          stageReached: lastAlert ? "objection" : null,
        });
      }

      function fmt(sec) {
        return `${Math.floor(sec / 60)}:${String(sec % 60).padStart(2, "0")}`;
      }

      const latestAlerts = alerts.slice(-3).reverse();

      return (
        <div style={{
          position: "fixed", bottom: 24, left: 24, zIndex: 950,
          width: "min(340px, calc(100vw - 48px))",
          background: "#1a1d27", border: "1px solid #2d3748", borderRadius: 16,
          boxShadow: "0 8px 40px rgba(0,0,0,.7)", padding: 20,
        }}>
          {/* Header */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <span style={{ fontSize: 18 }}>🎤</span>
              <span style={{ color: "#f1f5f9", fontWeight: 700, fontSize: 15 }}>Live Listen</span>
              {isListening && (
                <span style={{
                  background: "#dc2626", color: "#fff", fontSize: 10, fontWeight: 700,
                  borderRadius: 99, padding: "2px 8px",
                }}>LIVE</span>
              )}
            </div>
            <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
              {isListening && (
                <span style={{ color: "#60a5fa", fontSize: 13, fontWeight: 700, fontVariantNumeric: "tabular-nums" }}>
                  {fmt(callTimer)}
                </span>
              )}
              <button onClick={() => setShowPingPong(p => !p)} title="Ping-Pong mode" style={{ background: showPingPong ? "#1e40af" : "none", border: `1px solid ${showPingPong ? "#3b82f6" : "transparent"}`, color: showPingPong ? "#60a5fa" : "#64748b", cursor: "pointer", borderRadius: 6, padding: "2px 8px", fontSize: 13, fontWeight: 700, lineHeight: 1.4 }}>🏓</button>
              <button onClick={onClose} style={{ background: "none", border: "none", color: "#64748b", cursor: "pointer", fontSize: 20, lineHeight: 1 }}>×</button>
            </div>
          </div>

          {/* Audio level bar */}
          {isListening && (
            <div style={{ height: 6, background: "#0f1117", borderRadius: 99, marginBottom: 14, overflow: "hidden" }}>
              <div style={{
                height: "100%", width: `${audioLevel}%`, borderRadius: 99,
                background: audioLevel > 60 ? "#4ade80" : audioLevel > 20 ? "#fbbf24" : "#2563eb",
                transition: "width .08s",
              }} />
            </div>
          )}

          {/* Detected objections */}
          {latestAlerts.length > 0 && (
            <div style={{ marginBottom: 12 }}>
              <p style={{ color: "#f87171", fontSize: 11, fontWeight: 700, marginBottom: 6, textTransform: "uppercase" }}>⚠️ Objection Detected</p>
              {latestAlerts.map((a, i) => {
                const obj = OBJECTIONS.find(o => o.id === a.objectionId);
                return (
                  <div key={i} style={{
                    background: "#1f0a0a", border: "1px solid #7f1d1d", borderRadius: 8, padding: "8px 12px", marginBottom: 6,
                  }}>
                    <p style={{ color: "#f87171", fontWeight: 700, fontSize: 12, marginBottom: 3 }}>{obj?.objection || a.objectionId}</p>
                    <p style={{ color: "#94a3b8", fontSize: 11 }}>{obj?.rebuttal?.substring(0, 100)}…</p>
                  </div>
                );
              })}
            </div>
          )}

          {/* Buying signals */}
          {signals.length > 0 && (
            <div style={{ marginBottom: 12 }}>
              <p style={{ color: "#4ade80", fontSize: 11, fontWeight: 700, marginBottom: 6, textTransform: "uppercase" }}>🟢 Buying Signals</p>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                {signals.slice(-6).map((s, i) => (
                  <span key={i} style={{
                    background: "#052e16", border: "1px solid #14532d", color: "#4ade80",
                    fontSize: 11, fontWeight: 600, borderRadius: 99, padding: "2px 8px",
                  }}>"{s}"</span>
                ))}
              </div>
            </div>
          )}

          {/* Ping-Pong */}
          {showPingPong && (() => {
            const obj = OBJECTIONS[pingPongIdx];
            const tech = TECHNIQUE_MAP[obj.id] || { technique: "Consult", color: "#94a3b8", tone: "Calm and curious." };
            return (
              <div style={{ marginBottom: 12 }}>
                <div style={{ background: "#1f0a0a", border: "1px solid #7f1d1d", borderRadius: "10px 10px 0 0", padding: 10 }}>
                  <div style={{ color: "#f87171", fontSize: 10, fontWeight: 800, marginBottom: 4 }}>🙋 CUSTOMER SAYS</div>
                  <p style={{ color: "#fca5a5", fontSize: 13, fontStyle: "italic", lineHeight: 1.5 }}>"{obj.objection}"</p>
                </div>
                <div style={{ background: "#0f1d3d", border: "1px solid #1e3a5f", borderTop: "none", borderRadius: "0 0 10px 10px", padding: 10 }}>
                  <div style={{ color: "#60a5fa", fontSize: 10, fontWeight: 800, marginBottom: 4 }}>🎯 YOU SAY</div>
                  <p style={{ color: "#dbeafe", fontSize: 12, fontStyle: "italic", lineHeight: 1.5 }}>"{obj.rebuttal.substring(0, 150)}{obj.rebuttal.length > 150 ? "…" : ""}"</p>
                  <div style={{ marginTop: 6, display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
                    <span style={{ color: tech.color, fontSize: 10, fontWeight: 700, background: tech.color + "18", borderRadius: 4, padding: "2px 6px" }}>{tech.technique}</span>
                    <span style={{ color: "#64748b", fontSize: 10 }}>🎙️ {tech.tone.split(".")[0]}</span>
                  </div>
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 8 }}>
                  <button onClick={() => setPingPongIdx((pingPongIdx - 1 + OBJECTIONS.length) % OBJECTIONS.length)} style={{ background: "#1a1d27", border: "1px solid #2d3748", color: "#94a3b8", borderRadius: 6, padding: "4px 14px", fontSize: 14, cursor: "pointer" }}>◀</button>
                  <span style={{ color: "#475569", fontSize: 11 }}>{obj.icon} {pingPongIdx + 1} / {OBJECTIONS.length}</span>
                  <button onClick={() => setPingPongIdx((pingPongIdx + 1) % OBJECTIONS.length)} style={{ background: "#1a1d27", border: "1px solid #2d3748", color: "#94a3b8", borderRadius: 6, padding: "4px 14px", fontSize: 14, cursor: "pointer" }}>▶</button>
                </div>
              </div>
            );
          })()}

          {/* Transcript */}
          {transcript && (
            <div style={{ marginBottom: 12 }}>
              <p style={{ color: "#64748b", fontSize: 11, fontWeight: 700, marginBottom: 4, textTransform: "uppercase" }}>Transcript (mic)</p>
              <div style={{ maxHeight: 70, overflowY: "auto", background: "#0f1117", borderRadius: 8, padding: "6px 10px" }}>
                <p style={{ color: "#94a3b8", fontSize: 11, lineHeight: 1.5 }}>{transcript.slice(-300)}</p>
              </div>
            </div>
          )}

          {/* Permission error */}
          {permError && (
            <div style={{ background: "#1f0a0a", border: "1px solid #7f1d1d", borderRadius: 8, padding: "8px 12px", marginBottom: 12 }}>
              <p style={{ color: "#f87171", fontSize: 12 }}>{permError}</p>
            </div>
          )}

          {/* Controls */}
          <div style={{ display: "flex", gap: 8 }}>
            {!isListening ? (
              <button onClick={startListening} style={{
                flex: 1, background: "#dc2626", color: "#fff", border: "none",
                borderRadius: 8, padding: "10px 14px", fontSize: 13, fontWeight: 700, cursor: "pointer",
              }}>▶ Start Listening</button>
            ) : (
              <>
                <button onClick={stopListening} style={{
                  flex: 1, background: "#475569", color: "#fff", border: "none",
                  borderRadius: 8, padding: "10px 14px", fontSize: 13, fontWeight: 700, cursor: "pointer",
                }}>■ Stop</button>
                <button onClick={handleGradeCall} style={{
                  flex: 1, background: "#2563eb", color: "#fff", border: "none",
                  borderRadius: 8, padding: "10px 14px", fontSize: 13, fontWeight: 700, cursor: "pointer",
                }}>Grade Call →</button>
              </>
            )}
          </div>

          <p style={{ color: "#475569", fontSize: 10, marginTop: 10, lineHeight: 1.5 }}>
            Chrome will ask you to share a tab. Choose the tab with your softphone. Audio is analysed only — never recorded or sent anywhere.
          </p>
        </div>
      );
    }

    /* ─────────────────────────── EXPORT ─────────────────────────── */

    function exportCSV() {
      const rows = [
        ["Category", "Industry", "Target_Customer", "Annual_Revenue", "Expected_Call_Time", "Call_Type", "Use_Case", "Opening_Hook", "Reconciliation_Watchout", "Why_They_Reject", "Pivot_Suggestion", "Walk_Away_When", "Buyer_Signals"],
        ...INDUSTRIES.map(i => [
          "Industry",
          i.name,
          i.target,
          i.annualRevenue,
          i.callTime,
          i.callType,
          i.useCase,
          i.hook,
          i.reconciliation,
          i.rejection.join(" | "),
          i.pivot,
          i.altTarget,
          i.buyerSignals.join(" | "),
        ]),
        ["Category", "Competitor", "Summary", "Their_Strengths", "Their_Weaknesses", "Counter_Script", "Win_When", "Lose_When"],
        ...BATTLE_CARDS.map(b => [
          "BattleCard",
          b.competitor,
          b.summary,
          b.strengths.join(" | "),
          b.weaknesses.join(" | "),
          b.counterScript,
          b.winWhen,
          b.loseTo,
        ]),
      ];

      const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(",")).join("\n");
      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "shift4-sales-engine.csv"; a.click();
      URL.revokeObjectURL(url);
    }

    /* ─────────────────────────── APP ─────────────────────────── */

    const OUTCOME_LABELS = { won: "Won", progressing: "Progressed", lost: "Lost", noanswer: "No Answer", voicemail: "Voicemail", wrongnumber: "Wrong #" };
    const OUTCOME_COLOURS = { won: "#4ade80", progressing: "#60a5fa", lost: "#f87171", noanswer: "#64748b", voicemail: "#c084fc", wrongnumber: "#475569" };

    const CALL_STATES = [
      { id: "open",       label: "Call Open",      icon: "🟢", color: "#16a34a", bg: "#052e16", border: "#14532d" },
      { id: "losing",     label: "Losing Call",    icon: "🔴", color: "#dc2626", bg: "#1f0a0a", border: "#7f1d1d" },
      { id: "objecting",  label: "Objecting",      icon: "🟡", color: "#ca8a04", bg: "#1c1400", border: "#713f12" },
      { id: "closed",     label: "Closed / Won",   icon: "🏆", color: "#7c3aed", bg: "#150d2e", border: "#4c1d95" },
      { id: "dead",       label: "Dead Lead",      icon: "💀", color: "#475569", bg: "#0f1117", border: "#334155" },
    ];

    function CallStateToggle({ callState, setCallState }) {
      return (
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
          <span style={{ color: "#64748b", fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: ".5px", marginRight: 4 }}>Call Status:</span>
          {CALL_STATES.map(s => (
            <button
              key={s.id}
              onClick={() => setCallState(s.id)}
              style={{
                padding: "4px 12px", border: `1px solid ${callState === s.id ? s.color : "#334155"}`,
                borderRadius: 99, cursor: "pointer", fontSize: 12, fontWeight: 600,
                background: callState === s.id ? s.bg : "transparent",
                color: callState === s.id ? s.color : "#64748b",
                transition: "all .15s",
              }}
            >
              {s.icon} {s.label}
            </button>
          ))}
        </div>
      );
    }

    function App() {
      const [activeTab, setActiveTab]       = useState("industries");
      const [callState, setCallState]       = useState("open");
      const [callLog, setCallLog]           = useState([]);
      const [showFeedback, setShowFeedback]   = useState(false);
      const [showIntervention, setShowIntervention] = useState(false);
      const [interventionStreak, setInterventionStreak] = useState(0);
      const [dismissedAt, setDismissedAt]     = useState(null);
      const [showLiveListen, setShowLiveListen] = useState(false);
      const [liveGradeInit, setLiveGradeInit]   = useState({});
      const [showPreCall, setShowPreCall]         = useState(false);
      const [preCallContext, setPreCallContext]   = useState({});
      const [isLoading, setIsLoading]             = useState(true);

      // Load call log from Supabase (or localStorage fallback) on mount
      useEffect(() => {
        fetchCallLog().then(calls => { setCallLog(calls); setIsLoading(false); });
      }, []);

      const currentState = CALL_STATES.find(s => s.id === callState);
      const todayStreak  = getBadStreak(callLog);

      // Soft warning: 2 bad in a row (not yet a hard stop)
      const softWarn = todayStreak === 2;

      async function handleSaveCall(call) {
        await persistCall(call);
        const newLog = [...callLog, call];
        setCallLog(newLog);
        setShowFeedback(false);
        setPreCallContext({});

        const streak = getBadStreak(newLog);
        const hourTrigger = checkHourTrigger(newLog);

        // Hard stop: 3+ bad in a row OR bad hour block
        // Only fire if we haven't dismissed in the last 10 minutes
        const now = Date.now();
        const cooldown = dismissedAt && (now - dismissedAt) < 600000;
        if (!cooldown && (streak >= 3 || hourTrigger)) {
          setInterventionStreak(streak);
          setShowIntervention(true);
        }
      }

      function handleDismissIntervention() {
        setShowIntervention(false);
        setDismissedAt(Date.now());
      }

      function handleGradeCall(init) {
        setShowLiveListen(false);
        setLiveGradeInit(init || {});
        setShowFeedback(true);
      }

      function handlePreCallStart(ctx) {
        setPreCallContext(ctx || {});
        setShowPreCall(false);
      }

      const views = {
        industries:  <IndustryView />,
        battlecards: <BattleCardsView />,
        bna:         <BNAView />,
        objections:  <ObjectionsView callState={callState} />,
        lostleads:   <LostLeadsView />,
        surcharge:   <SurchargeIntelView />,
        incentives:  <IncentivesView />,
        social:      <SocialProofView />,
        facts:       <QuickFactsView />,
        coaching:    <CoachingView log={callLog} onSetTab={setActiveTab} isLoading={isLoading} />,
      };

      return (
        <div style={{ minHeight: "100vh" }}>
          {/* Header */}
          <div style={{
            background: "linear-gradient(135deg, #1e3a5f 0%, #0f1117 60%)",
            borderBottom: "1px solid #2d3748", padding: "20px 24px 0",
          }}>
            <div style={{ maxWidth: 960, margin: "0 auto" }}>
              {/* Top row */}
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12, marginBottom: 12 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{
                    width: 40, height: 40, background: "#2563eb", borderRadius: 10,
                    display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20,
                  }}>💳</div>
                  <div>
                    <h1 style={{ fontSize: 20, fontWeight: 800, color: "#f1f5f9" }}>Shift4 Sales Engine</h1>
                    <p style={{ color: "#64748b", fontSize: 12 }}>Australian Market · Live call reference</p>
                  </div>
                </div>
                {/* Right-side controls */}
                <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
                  <button
                    onClick={() => setShowLiveListen(v => !v)}
                    style={{
                      background: showLiveListen ? "#dc2626" : "#1a1d27",
                      border: `1px solid ${showLiveListen ? "#dc2626" : "#2d3748"}`,
                      borderRadius: 99, padding: "6px 14px", fontSize: 12, fontWeight: 700,
                      cursor: "pointer", color: showLiveListen ? "#fff" : "#94a3b8",
                      display: "flex", alignItems: "center", gap: 6,
                    }}
                  >
                    🎤 {showLiveListen ? "Listening…" : "Live Listen"}
                  </button>
                  <div style={{
                    background: currentState.bg, border: `1px solid ${currentState.border}`,
                    borderRadius: 10, padding: "6px 14px", fontSize: 14, fontWeight: 700, color: currentState.color,
                  }}>
                    {currentState.icon} {currentState.label}
                  </div>
                </div>
              </div>

              {/* Call State Toggle */}
              <div style={{ marginBottom: 12 }}>
                <CallStateToggle callState={callState} setCallState={setCallState} />
              </div>

              {/* Tabs */}
              <div style={{ display: "flex", gap: 2, overflowX: "auto", paddingBottom: 0 }}>
                {TABS.map(tab => (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    style={{
                      padding: "9px 14px", border: "none", cursor: "pointer",
                      fontSize: 12, fontWeight: 600, whiteSpace: "nowrap",
                      borderRadius: "8px 8px 0 0",
                      background: activeTab === tab.id ? "#1a1d27" : "transparent",
                      color: activeTab === tab.id ? "#60a5fa" : "#64748b",
                      borderBottom: activeTab === tab.id ? "2px solid #2563eb" : "2px solid transparent",
                      transition: "all .15s",
                    }}
                  >
                    {tab.icon} {tab.label}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* Surcharge deadline notice */}
          {callState === "open" && !softWarn && (
            <div style={{ background: "#1f0a0a", borderBottom: "1px solid #7f1d1d", padding: "8px 24px" }}>
              <div style={{ maxWidth: 960, margin: "0 auto" }}>
                <p style={{ color: "#f87171", fontSize: 12, fontWeight: 600 }}>⚠️ SURCHARGE BAN — 1 Oct 2026. Use deadline as urgency on every call. See Surcharge Intel tab for full script.</p>
              </div>
            </div>
          )}

          {softWarn && (
            <div style={{ background: "#1c1400", borderBottom: "1px solid #713f12", padding: "10px 24px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ maxWidth: 960, margin: "0 auto", width: "100%", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12 }}>
                <p style={{ color: "#fbbf24", fontSize: 13, fontWeight: 600 }}>
                  🟡 Two tough calls in a row — you're doing fine. Check the Objections tab before the next one and make sure your opener is landing.
                </p>
                <button onClick={() => setActiveTab("objections")} style={{
                  background: "#713f12", border: "none", borderRadius: 8, padding: "6px 14px",
                  color: "#fbbf24", fontSize: 12, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap",

              </div>
            </div>

          {/* Content */}
          <div style={{ maxWidth: 960, margin: "0 auto", padding: "24px 24px 100px" }}>
            {views[activeTab]}
          </div>

          {/* Floating buttons */}
          <button onClick={() => setShowPreCall(true)} style={{
            position: "fixed", bottom: 80, right: 24, zIndex: 900,
            background: preCallContext.callType ? "#16a34a" : "#1a1d27",
            border: `1px solid ${preCallContext.callType ? "#14532d" : "#2d3748"}`,
            color: preCallContext.callType ? "#4ade80" : "#94a3b8",
            borderRadius: 99, padding: "10px 18px", fontSize: 13, fontWeight: 700, cursor: "pointer",
            boxShadow: "0 4px 16px rgba(0,0,0,.4)", display: "flex", alignItems: "center", gap: 8,
          }}>
            🎯 {preCallContext.callType ? "Pre-call done ✓" : "Pre-Call"}
          </button>
          <FloatingLogButton onClick={() => setShowFeedback(true)} />

          {/* Pre-call planner modal */}
          {showPreCall && (
            <PreCallModal
              onStart={handlePreCallStart}
              onClose={() => setShowPreCall(false)}
            />
          )}

          {/* Live Listen panel */}
          {showLiveListen && (
            <LiveListenPanel
              onGradeCall={handleGradeCall}
              onClose={() => setShowLiveListen(false)}
            />
          )}

          {/* Post-call feedback modal */}
          {showFeedback && (
            <FeedbackModal
              onSave={handleSaveCall}
              onClose={() => { setShowFeedback(false); setLiveGradeInit({}); setPreCallContext({}); }}
              initialValues={{ ...preCallContext, ...liveGradeInit }}
            />
          )}

          {/* Hard stop intervention modal */}
          {showIntervention && (
            <InterventionModal
              streak={interventionStreak}
              log={callLog}
              onDismiss={handleDismissIntervention}
              onSetTab={(tab) => { setActiveTab(tab); handleDismissIntervention(); }}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
